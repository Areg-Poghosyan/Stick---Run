let audioCtx = null, muted = false, bgGain = null, bgTimer = null, bgStep = 0, wasInAir = false, shake = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgGain = audioCtx.createGain();
  bgGain.gain.value = 0.07;
  bgGain.connect(audioCtx.destination);
  scheduleBg();
}

function tone(freq, dur, vol, type, startFreq, dest) {
  if (muted || !audioCtx) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.connect(g); g.connect(dest || audioCtx.destination);
  if (startFreq) { osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(freq, audioCtx.currentTime + dur * 0.4); }
  else osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playJump()  { tone(600, 0.09, 0.18, 'sine', 280); }
function playLand()  { tone(55,  0.13, 0.28, 'sine', 110); }
function playCoin()  { tone(1320, 0.18, 0.22, 'sine', 880); }
function playDie()   { tone(150, 0.3, 0.25, 'sawtooth', 400); }
function playWin() {
  if (muted || !audioCtx) return;
  [523,659,784,1047,1319].forEach((f, i) => {
    const t = audioCtx.currentTime + i * 0.18;
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = f; g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.start(t); osc.stop(t + 0.38);
  });
}
function playGameOver() {
  if (muted || !audioCtx) return;
  [330,277,220,165].forEach((f, i) => {
    const t = audioCtx.currentTime + i * 0.22;
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = f; g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.start(t); osc.stop(t + 0.38);
  });
}
function playBirdHit() {
  if (muted || !audioCtx) return;
  tone(180, 0.12, 0.3, 'square', 380);
  tone(90,  0.18, 0.2, 'sine');
}
function playTimerTick() {
  if (muted || !audioCtx) return;
  tone(880, 0.06, 0.12, 'square');
}

// Jazz ii-V-I-VI in C — walking bass + chord stabs on 2 & 4
const N = { C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,
             C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,B4:493.88,
             C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:784 };
const JAZZ = [
  { bass:[N.D3,N.F3,N.A3,N.C4], stab:[N.F4,N.A4,N.C5]    },  // Dm7
  { bass:[N.G3,N.B3,N.D4,N.F4], stab:[N.B4,N.D5,N.F5]    },  // G7
  { bass:[N.C3,N.E3,N.G3,N.B3], stab:[N.E4,N.G4,N.B4]    },  // Cmaj7
  { bass:[N.A3,N.C4,N.E4,N.G4], stab:[N.C5,N.E5,N.G5]    },  // Am7
];

function scheduleBg() {
  if (muted || !audioCtx) return;
  const beat  = bgStep % 4;
  const chord = JAZZ[Math.floor(bgStep / 4) % JAZZ.length];

  // Walking bass (triangle, warm low tone)
  const ob = audioCtx.createOscillator(), gb = audioCtx.createGain();
  ob.type = 'triangle'; ob.frequency.value = chord.bass[beat];
  ob.connect(gb); gb.connect(bgGain);
  gb.gain.setValueAtTime(0.9, audioCtx.currentTime);
  gb.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.38);
  ob.start(); ob.stop(audioCtx.currentTime + 0.4);

  // Chord stab on beats 2 & 4 (classic jazz backbeat)
  if (beat === 1 || beat === 3) {
    chord.stab.forEach(f => {
      const os = audioCtx.createOscillator(), gs = audioCtx.createGain();
      os.type = 'sine'; os.frequency.value = f;
      os.connect(gs); gs.connect(bgGain);
      gs.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gs.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
      os.start(); os.stop(audioCtx.currentTime + 0.25);
    });
  }

  bgStep++;
  // Swing timing: long on downbeats, short on upbeats
  bgTimer = setTimeout(scheduleBg, beat % 2 === 0 ? 310 : 200);
}
function stopBg() { clearTimeout(bgTimer); bgTimer = null; }
function startBg() { if (!bgTimer && !muted && audioCtx) scheduleBg(); }

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇 Unmute' : '🔊 Mute';
  if (muted) stopBg(); else startBg();
}

function resetPlayer() {
  player = { x: 55, y: plats[0].y - PH, vx: 0, vy: 0, facing: 1, walkCycle: 0, state: 'idle' };
  cam = { x: 0 };
  jumpsLeft = MAX_JUMPS;
  jumpConsumed = false;
  deathFlash = 0;
  invincible = 0;
  needAllCoins = 0;
}

function resetGame() {
  plats    = currentLevel === 3 ? PLATS3 : currentLevel === 2 ? PLATS2 : PLATS1;
  birds    = (currentLevel === 3 ? BIRD_DEFS3 : currentLevel === 2 ? BIRD_DEFS2 : BIRD_DEFS).map(([wx, y, spd, range]) => ({ wx, startWx: wx, y, spd, dir: 1, range }));
  spikes       = currentLevel === 3 ? SPIKES3 : currentLevel === 2 ? SPIKES2 : SPIKES1;
  movingPlats  = currentLevel === 3 ? MOVINGPLATS3 : currentLevel === 2 ? MOVINGPLATS2 : MOVINGPLATS1;
  windZones= currentLevel === 3 ? WINDZONES3 : currentLevel === 2 ? WINDZONES2 : WINDZONES1;
  springs  = currentLevel === 3 ? SPRINGS3 : currentLevel === 2 ? SPRINGS2 : SPRINGS1;
  coins = plats.filter(p => p.type === 1 && !spikes.some(s => s.y === p.y && Math.abs(p.x + p.w / 2 - s.wx) <= s.w / 2)).map(p => ({ wx: p.x + p.w / 2, y: p.y - 28, collected: false }));
  resetPlayer();
  frameCount = 0;
  won = false;
  gameOver = false;
  lives = 3;
  coins.forEach(c => c.collected = false);
  checkpoint.wx = currentLevel === 3 ? 2012 : currentLevel === 2 ? 1819 : 1755;
  checkpoint.platY = currentLevel === 3 ? 380 : currentLevel === 2 ? 230 : 430;
  checkpoint.activated = false; spawnX = 55; spawnY = plats[0].y - PH;
  paused = false;
  score = 0; streak = 0; timerFrames = 0; timerLimit = currentLevel === 2 ? 70 : 90; dust = []; dialogueIndex = 0; talkingToNpc = false;
  stopBg(); bgStep = 0; startBg();
}
resetGame();

const keys = {};
window.addEventListener('keydown', e => {
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
  if (showMenu && !showCustomize && !showLevelSelect) showMenu = false;
  initAudio(); startBg();
  // DEV CHEAT — remove before release
  if (e.key === 'g' && e.ctrlKey) { godMode = !godMode; }
  if (e.key === '`' && !showMenu && !won && !gameOver && !showEnding) {
    if (currentLevel === 3) { showEnding = true; endingStart = Date.now(); endingPhase = 'lines'; stopBg(); playWin(); }
    else { won = true; stopBg(); playWin(); }
  }
  if ((e.key === 'p' || e.key === 'P') && !won && !gameOver) {
    paused = !paused;
    if (paused) stopBg(); else startBg();
  }
  if (e.key === 'e' || e.key === 'E') {
    if (currentLevel === 1) {
    const nearNpc = Math.abs((player.x + PW/2) - NPC_X) < 80;
    if (nearNpc && !talkingToNpc) { talkingToNpc = true; dialogueIndex = 0; }
    else if (talkingToNpc) {
      dialogueIndex++;
      if (dialogueIndex >= DIALOGUE.length) { talkingToNpc = false; dialogueIndex = 0; }
    }
    } else if (currentLevel === 2) {
    const nearNpc2 = Math.abs((player.x + PW/2) - NPC2_X) < 80;
    if (nearNpc2 && !talkingToNpc) { talkingToNpc = true; dialogueIndex = 0; }
    else if (talkingToNpc) {
      dialogueIndex++;
      if (dialogueIndex >= DIALOGUE2.length) { talkingToNpc = false; dialogueIndex = 0; }
    }
    }
  }
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (['ArrowUp','w','W',' '].includes(e.key)) jumpConsumed = false;
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top)  * (H / r.height);
  canvas.style.cursor = (showMenu || showCustomize || showLevelSelect) ? 'pointer' : 'default';
});
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top)  * (H / r.height);
  if (showCustomize) { handleCustomizeClick(mx, my); return; }
  if (showInterlude) {
    const el = Date.now() - interludeStart;
    if (el > (INTERLUDE.length - 1) * 1800 + 800 && hit(mx, my, W/2, 430, 160, 48)) {
      showInterlude = false; currentLevel = 2; resetGame();
    }
    return;
  }
  if (showLevelSelect) {
    const el = Date.now() - levelSelectStart;
    if (el > (STORY.length - 1) * 1800 + 800 && hit(mx, my, W/2, 435, 170, 48)) {
      showMenu = false; showLevelSelect = false; currentLevel = 1; startBg();
    }
    return;
  }
  if (showEnding && endingPhase === 'buttons') {
    if (hit(mx, my, W/2 - 140, 390, 200, 50)) { showEnding = false; currentLevel = 1; resetGame(); startBg(); }
    if (hit(mx, my, W/2 + 140, 390, 180, 50)) { endingPhase = 'walkaway'; endingFadeStart = Date.now(); }
    return;
  }
  if (showMenu) {
    if (hit(mx, my, W/2, 308, 160, 46)) { showLevelSelect = true; levelSelectStart = Date.now(); initAudio(); }
    if (hit(mx, my, W/2, 368, 220, 46)) showCustomize = true;
  }
});

function loseLife() {
  if (invincible > 0) return;
  lives--;
  deathFlash = 24;
  invincible = 90;
  if (lives <= 0) { gameOver = true; stopBg(); playGameOver(); return; }
  streak = 0; playDie();
  score = Math.max(-9999, score - 500);
  player.x = spawnX; player.y = spawnY;
  player.vx = 0; player.vy = 0;
  cam.x = Math.max(0, spawnX - W * 0.3);
  jumpsLeft = MAX_JUMPS;
}

function update() {
  if (showMenu) return;
  if (paused) {
    if (keys['r'] || keys['R']) { paused = false; resetGame(); }
    if (keys['m'] || keys['M']) { paused = false; resetGame(); showMenu = true; stopBg(); }
    return;
  }
  if (showEnding) return;
  if (won || gameOver) {
    if (keys['r'] || keys['R']) resetGame();
    if (won && (keys['k'] || keys['K'])) {
      if (currentLevel === 2) { won = false; currentLevel = 3; resetGame(); }
      else { won = false; showInterlude = true; interludeStart = Date.now(); }
    }
    return;
  }

  frameCount++;
  if (deathFlash > 0) deathFlash--;
  if (invincible > 0) invincible--;

  // Birds
  for (const b of birds) {
    b.wx += b.spd * b.dir;
    if (Math.abs(b.wx - b.startWx) > b.range) b.dir *= -1;
    // Bird collision
    if (!godMode && invincible === 0) {
      const bsx = b.wx - cam.x;
      const psx = player.x - cam.x;
      if (Math.abs(b.wx - (player.x + PW/2)) < 22 && Math.abs(b.y - (player.y + PH/2)) < 22) {
        playBirdHit(); loseLife(); break;
      }
    }
  }

  // Move platforms
  let ridingPlat = null;
  for (const mp of movingPlats) {
    if (mp.vx) { mp.x += mp.vx; if (mp.x < mp.min || mp.x > mp.max) mp.vx *= -1; }
    if (mp.vy) { mp.y += mp.vy; if (mp.y < mp.min || mp.y > mp.max) mp.vy *= -1; }
  }

  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  const jump  = keys['ArrowUp']    || keys['w'] || keys['W'] || keys[' '];

  if (left)       { player.vx = -SPEED; player.facing = -1; }
  else if (right) { player.vx =  SPEED; player.facing =  1; }
  else            { player.vx *= 0.76; }

  // Wind zones
  for (const wz of windZones) {
    const px = player.x + PW/2, py = player.y + PH/2;
    if (px > wz.wx && px < wz.wx + wz.w && py > wz.y && py < wz.y + wz.h) {
      if (wz.force)  { player.vx += wz.force * 0.2; player.vx = Math.max(-9, Math.min(9, player.vx)); }
      if (wz.forceY) { player.vy += wz.forceY; player.vy = Math.max(-12, player.vy); }
    }
  }

  if (player.y + PH > 475) jumpsLeft = 0;
  if (jump && !jumpConsumed && jumpsLeft > 0) {
    player.vy = JUMP_V; jumpsLeft--; jumpConsumed = true; playJump(); shake = 3.3;
    for (let i = 0; i < 6; i++) dust.push({
      x: player.x + PW/2, y: player.y + PH,
      vx: (Math.random() - 0.5) * 2.5, vy: Math.random() * -1.2,
      life: 1, r: 4 + Math.random() * 4,
    });
  }
  if (!jump && player.vy < -4.5) player.vy = Math.min(player.vy + 1.2, -4.5);

  player.vy = Math.min(player.vy + G, MAX_VY);
  const prevBottom = player.y + PH;
  player.x += player.vx;
  player.y += player.vy;
  player.x = Math.max(0, player.x);

  let onGround = false;
  for (const p of plats) {
    const currBottom = player.y + PH;
    const inX = player.x + PW > p.x + 4 && player.x < p.x + p.w - 4;
    if (inX && currBottom >= p.y && prevBottom <= p.y + 10 && player.vy >= 0) {
      player.y = p.y - PH; player.vy = 0; onGround = true; jumpsLeft = MAX_JUMPS;
      if (wasInAir) playLand();
      // Spring check
      for (const sp of springs) {
        if (sp.y === p.y && Math.abs(sp.wx - (player.x + PW/2)) < 18) {
          player.vy = -22; onGround = false; playJump(); break;
        }
      }
      if (p.type === 3) {
        if (coins.every(c => c.collected)) { score += Math.max(0, 5000 - Math.floor(timerFrames/60)*50); if (currentLevel === 3) { showEnding = true; endingStart = Date.now(); endingPhase = 'lines'; stopBg(); playWin(); } else { won = true; stopBg(); playWin(); } return; }
        else { needAllCoins = 120; }
      }
    }
  }

  // Moving platform collision
  for (const mp of movingPlats) {
    const currBottom = player.y + PH;
    const inX = player.x + PW > mp.x + 2 && player.x < mp.x + mp.w - 2;
    if (inX && currBottom >= mp.y && prevBottom <= mp.y + 12 && player.vy >= 0) {
      player.y = mp.y - PH; player.vy = 0; onGround = true; jumpsLeft = MAX_JUMPS;
      ridingPlat = mp;
      if (wasInAir) playLand();
    }
  }
  if (ridingPlat) { player.x += ridingPlat.vx; player.y += ridingPlat.vy; }

  wasInAir = !onGround;
  if (!onGround && player.vy < -1)      player.state = 'jump';
  else if (!onGround)                   player.state = 'fall';
  else if (Math.abs(player.vx) > 0.5)  { player.state = 'walk'; player.walkCycle++; }
  else                                  player.state = 'idle';

  // Timer
  if (!won && !gameOver) {
    timerFrames++;
    const secsLeft = Math.max(0, timerLimit - Math.floor(timerFrames / 60));
    if (timerFrames >= timerLimit * 60) { stopBg(); playGameOver(); gameOver = true; return; }
    if (secsLeft <= 10 && timerFrames % 60 === 0) playTimerTick();
  }

  // Coin collection
  let gotCoin = false;
  for (const c of coins) {
    if (!c.collected && Math.abs(c.wx - (player.x + PW/2)) < 18 && Math.abs(c.y - (player.y + PH/2)) < 18) {
      c.collected = true; playCoin();
      streak++;
      score += (streak % 5 === 0) ? 300 : 100;
      gotCoin = true;
    }
  }

  if (!checkpoint.activated && player.x + PW/2 > checkpoint.wx) {
    checkpoint.activated = true;
    spawnX = checkpoint.wx - 20; spawnY = checkpoint.platY - PH;
  }

  if (needAllCoins > 0) needAllCoins--;
  if (player.y > H + 90) loseLife();

  // Spikes
  const SPIKE_H = 14;
  if (!godMode) for (const s of spikes) {
    if (player.x + PW > s.wx - s.w/2 + 2 && player.x < s.wx + s.w/2 - 2 &&
        player.y + PH > s.y - SPIKE_H && player.y < s.y) {
      loseLife(); break;
    }
  }

  const tgt = Math.max(0, Math.min(player.x - W * 0.3, WORLD_W - W));
  cam.x += (tgt - cam.x) * 0.11;
}

// ── Drawing ────────────────────────────────────────────────────────────────
function drawBg() {
  if (currentLevel === 3) {
    // Deep purple/black sky
    const sky3 = ctx.createLinearGradient(0, 0, 0, H);
    sky3.addColorStop(0, '#000000'); sky3.addColorStop(0.5, '#0d0018'); sky3.addColorStop(1, '#1a0033');
    ctx.fillStyle = sky3; ctx.fillRect(0, 0, W, H);
    // Faint stars
    ctx.fillStyle = 'rgba(200,180,255,0.6)';
    for (const s of menuStars) {
      const sx = s.x - cam.x * 0.02;
      ctx.beginPath(); ctx.arc(((sx % W) + W) % W, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    // Distant purple moon glow
    ctx.shadowColor = '#9900ff'; ctx.shadowBlur = 50;
    ctx.fillStyle = '#2a0050';
    ctx.beginPath(); ctx.arc(W * 0.15 - cam.x * 0.01, 70, 26, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Dark jagged hills — three parallax layers
    [
      [0.04, '#0a0012', 420, 160, 90],
      [0.12, '#07000d', 440, 110, 65],
      [0.24, '#040008', 460,  75, 45],
    ].forEach(([par, col, baseY, hillW, hillH]) => {
      const offset = cam.x * par, si = Math.floor(offset / hillW) - 1;
      ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(-2, H); ctx.lineTo(-2, baseY);
      for (let i = si; i < si + Math.ceil(W / hillW) + 3; i++) {
        const x2 = (i + 1) * hillW - offset;
        const pk = i * hillW + hillW * 0.5 - offset;
        const h = hillH * (0.5 + 0.5 * Math.abs(Math.sin(i * 3.7)));
        // Jagged peak: two sharp spikes per hill segment
        const mid1 = i * hillW + hillW * 0.3 - offset;
        const mid2 = i * hillW + hillW * 0.7 - offset;
        ctx.lineTo(mid1, baseY - h * 0.6);
        ctx.lineTo(pk,   baseY - h);
        ctx.lineTo(mid2, baseY - h * 0.5);
        ctx.lineTo(x2,   baseY);
      }
      ctx.lineTo(W + 2, H); ctx.closePath(); ctx.fill();
    });
    return;
  }
  if (currentLevel === 2) {
    // Hellish sky
    const sky2 = ctx.createLinearGradient(0, 0, 0, H);
    sky2.addColorStop(0, '#1a0000'); sky2.addColorStop(0.55, '#5a0000'); sky2.addColorStop(1, '#8b0000');
    ctx.fillStyle = sky2; ctx.fillRect(0, 0, W, H);
    // Lava glow orb at horizon
    ctx.shadowColor = '#ff4500'; ctx.shadowBlur = 70;
    ctx.fillStyle = '#cc2200';
    ctx.beginPath(); ctx.arc(W*0.88 - cam.x*0.018, H + 20, 60, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Dark smoke clouds
    ctx.fillStyle = 'rgba(18,4,0,0.75)';
    for (const c of clouds) {
      const cx = c.wx - cam.x * 0.13;
      if (cx < -130 || cx > W + 130) continue;
      ctx.beginPath(); ctx.ellipse(cx, c.y, 48*c.s, 23*c.s, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx-30*c.s, c.y+6*c.s, 32*c.s, 18*c.s, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+31*c.s, c.y+7*c.s, 30*c.s, 17*c.s, 0, 0, Math.PI*2); ctx.fill();
    }
    // Dark rocky hills
    [[0.05,'#1a0000',405,280,75],[0.14,'#110000',432,215,52],[0.28,'#0a0000',451,165,36]].forEach(([par,col,baseY,hillW,hillH]) => {
      const offset = cam.x * par, si = Math.floor(offset / hillW) - 1;
      ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(-2, H); ctx.lineTo(-2, baseY);
      for (let i = si; i < si + Math.ceil(W/hillW) + 3; i++) {
        const x2 = (i+1)*hillW - offset, mx = i*hillW + hillW*0.5 - offset;
        const h = hillH * (0.65 + 0.35 * Math.abs(Math.sin(i*2.3999)));
        ctx.quadraticCurveTo(mx, baseY - h, x2, baseY);
      }
      ctx.lineTo(W+2, H); ctx.closePath(); ctx.fill();
    });
    // Lava cracks at ground level
    ctx.shadowColor = '#ff4500'; ctx.shadowBlur = 14;
    ctx.strokeStyle = `rgba(255,110,0,${0.45 + Math.sin(frameCount*0.05)*0.3})`;
    ctx.lineWidth = 2.5;
    for (let i = 0; i < 7; i++) {
      const lx = ((i * 173 + 60) % 750) + (cam.x * 0.03 % 750) - 50;
      ctx.beginPath(); ctx.moveTo(lx, H-6); ctx.lineTo(lx+12, H-22); ctx.lineTo(lx+26, H-6); ctx.stroke();
    }
    ctx.shadowBlur = 0;
    return;
  }

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#95C8E8'); sky.addColorStop(0.65, '#C3E4F5'); sky.addColorStop(1, '#DDF1FF');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(90,140,195,0.10)'; ctx.lineWidth = 0.75;
  const gs = 22, gx = cam.x % gs;
  for (let x = -gx; x <= W + gs; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += gs)         { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  ctx.shadowColor = '#FFE566'; ctx.shadowBlur = 28;
  ctx.fillStyle = '#FFE255';
  ctx.beginPath(); ctx.arc(W*0.88 - cam.x*0.018, 68, 30, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  for (const c of clouds) {
    const cx = c.wx - cam.x * 0.13;
    if (cx < -130 || cx > W + 130) continue;
    ctx.beginPath(); ctx.ellipse(cx, c.y, 48*c.s, 23*c.s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-30*c.s, c.y+6*c.s, 32*c.s, 18*c.s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+31*c.s, c.y+7*c.s, 30*c.s, 17*c.s, 0, 0, Math.PI*2); ctx.fill();
  }

  // Hills
  [
    [0.05, '#ADC99A', 405, 280, 75],
    [0.14, '#7CBE62', 432, 215, 52],
    [0.28, '#5CA046', 451, 165, 36],
  ].forEach(([par, col, baseY, hillW, hillH]) => {
    const offset = cam.x * par;
    const si = Math.floor(offset / hillW) - 1;
    ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(-2, H); ctx.lineTo(-2, baseY);
    for (let i = si; i < si + Math.ceil(W/hillW) + 3; i++) {
      const x2 = (i+1)*hillW - offset, mx = i*hillW + hillW*0.5 - offset;
      const h = hillH * (0.65 + 0.35 * Math.abs(Math.sin(i*2.3999)));
      ctx.quadraticCurveTo(mx, baseY - h, x2, baseY);
    }
    ctx.lineTo(W+2, H); ctx.closePath(); ctx.fill();
  });
}

const PCOL = [
  ['#6DBD5A','#458A35','#336825'],
  ['#7ECB6A','#508D3D','#3D6E2F'],
  null,
  ['#FFD84D','#B89118','#8A6C12'],
];
function drawPlatforms() {
  for (const p of plats) {
    const px = p.x - cam.x;
    const [tc, bc, sc] = (currentLevel === 3 && p.type !== 3) ? ['#7b2fa8','#4b1270','#2a0a40'] : (currentLevel === 2 && p.type !== 3) ? ['#dc143c','#8b0020','#4a0010'] : PCOL[p.type];
    ctx.fillStyle = sc; ctx.fillRect(px+2, p.y+4, p.w, p.h);
    ctx.fillStyle = bc; ctx.fillRect(px, p.y+4, p.w, p.h-4);
    ctx.fillStyle = tc; ctx.fillRect(px, p.y, p.w, 6);
    if (p.type === 3) {
      ctx.strokeStyle = `rgba(255,215,0,${0.35 + Math.sin(frameCount*0.07)*0.25})`;
      ctx.lineWidth = 3.5; ctx.strokeRect(px-4, p.y-4, p.w+8, p.h+8);
    }
  }
}

function drawMarkers() {
  // Start
  const sx = 18 - cam.x;
  ctx.strokeStyle='#5C4020'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(sx, plats[0].y+5); ctx.lineTo(sx, plats[0].y-48); ctx.stroke();
  ctx.fillStyle='#3CB85A'; ctx.beginPath();
  ctx.moveTo(sx, plats[0].y-48); ctx.lineTo(sx+30, plats[0].y-38); ctx.lineTo(sx, plats[0].y-26); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1A6E1A'; ctx.font='bold 12px "Segoe Print",cursive'; ctx.textAlign='center';
  ctx.fillText('START', sx+15, plats[0].y-55);

  // Finish
  const fp = plats[plats.length-1];
  const fx = fp.x + fp.w/2 - cam.x, fy = fp.y;
  ctx.strokeStyle='#5C4020'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy-55); ctx.stroke();
  for (let r=0;r<4;r++) for(let c=0;c<6;c++) {
    ctx.fillStyle=(r+c)%2===0?'#111':'#FFF';
    ctx.fillRect(fx+c*5, fy-55+r*5, 5, 5);
  }
  ctx.font='24px serif'; ctx.textAlign='center'; ctx.fillText('🏆', fx+15, fy-63);
  ctx.fillStyle='#7A5A08'; ctx.font='bold 12px "Segoe Print",cursive';
  ctx.fillText('FINISH', fx+15, fy-75);
}

function drawBirds() {
  for (const b of birds) {
    const bx = b.wx - cam.x;
    if (bx < -40 || bx > W + 40) continue;
    ctx.save();
    ctx.translate(bx, b.y);
    if (b.dir < 0) ctx.scale(-1, 1);

    if (currentLevel === 3) {
      // Dragon body — dark purple
      ctx.fillStyle = '#3b006b';
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1a0030'; ctx.lineWidth = 1.5; ctx.stroke();
      // Left wing (top)
      ctx.fillStyle = '#5a0096';
      ctx.beginPath(); ctx.moveTo(-2, -4); ctx.lineTo(-22, -18); ctx.lineTo(4, -2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#1a0030'; ctx.lineWidth = 1; ctx.stroke();
      // Right wing (bottom)
      ctx.fillStyle = '#5a0096';
      ctx.beginPath(); ctx.moveTo(-2, 4); ctx.lineTo(-22, 18); ctx.lineTo(4, 2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#1a0030'; ctx.lineWidth = 1; ctx.stroke();
      // Tail
      ctx.fillStyle = '#3b006b';
      ctx.beginPath(); ctx.moveTo(-11, 0); ctx.lineTo(-22, -5); ctx.lineTo(-20, 5); ctx.closePath(); ctx.fill();
      // Snout
      ctx.fillStyle = '#5a0096';
      ctx.beginPath(); ctx.moveTo(13, -2); ctx.lineTo(22, 0); ctx.lineTo(13, 4); ctx.closePath(); ctx.fill();
      // Eye
      ctx.fillStyle = '#cc44ff';
      ctx.beginPath(); ctx.arc(7, -3, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(8, -3, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (currentLevel === 2) {
      // Dragon body
      ctx.fillStyle = '#6b0000';
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2a0000'; ctx.lineWidth = 1.5; ctx.stroke();
      // Left wing (top)
      ctx.fillStyle = '#8b0000';
      ctx.beginPath(); ctx.moveTo(-2, -4); ctx.lineTo(-22, -18); ctx.lineTo(4, -2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#2a0000'; ctx.lineWidth = 1; ctx.stroke();
      // Right wing (bottom)
      ctx.fillStyle = '#8b0000';
      ctx.beginPath(); ctx.moveTo(-2, 4); ctx.lineTo(-22, 18); ctx.lineTo(4, 2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#2a0000'; ctx.lineWidth = 1; ctx.stroke();
      // Tail
      ctx.fillStyle = '#6b0000';
      ctx.beginPath(); ctx.moveTo(-11, 0); ctx.lineTo(-22, -5); ctx.lineTo(-20, 5); ctx.closePath(); ctx.fill();
      // Snout
      ctx.fillStyle = '#8b0000';
      ctx.beginPath(); ctx.moveTo(13, -2); ctx.lineTo(22, 0); ctx.lineTo(13, 4); ctx.closePath(); ctx.fill();
      // Eye
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(7, -3, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(8, -3, 1.5, 0, Math.PI*2); ctx.fill();
    } else {
      // Bird body
      ctx.fillStyle = '#E87040';
      ctx.beginPath(); ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#6B2A0A'; ctx.lineWidth = 1.5; ctx.stroke();
      // Wing
      ctx.fillStyle = '#C85A28';
      ctx.beginPath(); ctx.moveTo(-4, -2); ctx.lineTo(-16, -10); ctx.lineTo(-6, 4); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#6B2A0A'; ctx.lineWidth = 1; ctx.stroke();
      // Tail
      ctx.fillStyle = '#C85A28';
      ctx.beginPath(); ctx.moveTo(-11, 0); ctx.lineTo(-20, -4); ctx.lineTo(-20, 4); ctx.closePath(); ctx.fill();
      // Beak
      ctx.fillStyle = '#FFB830';
      ctx.beginPath(); ctx.moveTo(13, -1); ctx.lineTo(20, 2); ctx.lineTo(13, 5); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#8A6000'; ctx.lineWidth = 1; ctx.stroke();
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(6, -3, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1A1208';
      ctx.beginPath(); ctx.arc(7, -3, 2, 0, Math.PI*2); ctx.fill();
      // Smile
      ctx.strokeStyle = '#6B2A0A'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(10, 2, 3, 0.2, Math.PI - 0.2); ctx.stroke();
    }

    ctx.restore();
  }
}

function drawCheckpoint() {
  const cx = checkpoint.wx - cam.x;
  if (cx < -40 || cx > W + 40) return;
  const base = checkpoint.platY;
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx, base); ctx.lineTo(cx, base - 52); ctx.stroke();
  ctx.fillStyle = checkpoint.activated ? '#22cc44' : '#dd2222';
  ctx.beginPath();
  ctx.moveTo(cx, base - 52); ctx.lineTo(cx + 30, base - 42); ctx.lineTo(cx, base - 30);
  ctx.closePath(); ctx.fill();
}

function drawMovingPlats() {
  for (const mp of movingPlats) {
    const px = mp.x - cam.x;
    if (px + mp.w < 0 || px > W) continue;
    const [mpT, mpB, mpS] = currentLevel === 2 ? ['#dc143c','#8b0020','#4a0010'] : ['#7ECB6A','#508D3D','#3D6E2F'];
    ctx.fillStyle = mpS; ctx.fillRect(px + 2, mp.y + 4, mp.w, mp.h);
    ctx.fillStyle = mpB; ctx.fillRect(px, mp.y + 4, mp.w, mp.h - 4);
    ctx.fillStyle = mpT; ctx.fillRect(px, mp.y, mp.w, 6);
  }
}

function drawSprings() {
  for (const sp of springs) {
    const sx = sp.wx - cam.x;
    if (sx < -30 || sx > W + 30) continue;
    ctx.fillStyle = currentLevel === 3 ? '#4b0082' : currentLevel === 2 ? '#dc143c' : '#33dd55';
    ctx.strokeStyle = currentLevel === 3 ? '#1a0040' : currentLevel === 2 ? '#8b0020' : '#1a8830'; ctx.lineWidth = 1.5;
    ctx.fillRect(sx - 12, sp.y - 8, 24, 8);
    ctx.strokeRect(sx - 12, sp.y - 8, 24, 8);
    // coil lines
    ctx.lineWidth = 1; ctx.beginPath();
    for (let i = 1; i < 4; i++) { const lx = sx - 12 + i * 6; ctx.moveTo(lx, sp.y - 8); ctx.lineTo(lx, sp.y); }
    ctx.stroke();
  }
}

function drawSpikes() {
  const SPIKE_H = 14;
  ctx.fillStyle = '#aaa';
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  for (const s of spikes) {
    const sx = s.wx - cam.x;
    if (sx < -60 || sx > W + 60) continue;
    const count = Math.floor(s.w / 10);
    const startX = sx - s.w / 2;
    for (let i = 0; i < count; i++) {
      const tx = startX + i * 10;
      ctx.beginPath();
      ctx.moveTo(tx, s.y);
      ctx.lineTo(tx + 5, s.y - SPIKE_H);
      ctx.lineTo(tx + 10, s.y);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  }
}

function drawWindZones() {
  for (const wz of windZones) {
    const wx = wz.wx - cam.x;
    if (wx + wz.w < 0 || wx > W) continue;
    const isUp = wz.forceY < 0;
    const right = wz.force > 0;
    ctx.save();
    ctx.globalAlpha = 0.13;
    ctx.fillStyle = isUp ? '#44ffcc' : (right ? '#44aaff' : '#ffaa44');
    ctx.fillRect(wx, wz.y, wz.w, wz.h);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = isUp ? '#22bb88' : (right ? '#2277cc' : '#cc7722');
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    if (isUp) {
      for (let ay = wz.y + 60; ay < wz.y + wz.h - 20; ay += 90)
        ctx.fillText('↑', wx + wz.w / 2, ay);
    } else {
      ctx.fillText(right ? '→  →' : '←  ←', wx + wz.w / 2, wz.y + wz.h / 2 + 10);
    }
    ctx.font = '10px "Segoe Print",cursive';
    ctx.fillText('WIND', wx + wz.w / 2, wz.y + 14);
    ctx.restore();
  }
}

function drawFigure() {
  if (invincible > 0 && Math.floor(invincible / 6) % 2 === 0) return; // blink when invincible

  const cx = Math.round(player.x + PW*0.5 - cam.x);
  const cy = Math.round(player.y + PH);
  ctx.save(); ctx.translate(cx, cy);
  if (player.facing === -1) ctx.scale(-1, 1);

  const t = player.walkCycle * 0.21;
  const walk = player.state === 'walk', jump = player.state === 'jump', fall = player.state === 'fall';
  let ll = 0, rl = 0, la = 0.18, ra = -0.18;
  if (walk)      { ll= Math.sin(t)*0.52; rl=-Math.sin(t)*0.52; la=-Math.sin(t)*0.38; ra=Math.sin(t)*0.38; }
  else if (jump) { ll=0.28; rl=0.28; la=-0.88; ra=0.88; }
  else if (fall) { ll=-0.18; rl=-0.18; la=0.55; ra=-0.55; }

  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=2.6;

  ctx.strokeStyle = figureColors.limbs;
  ctx.save(); ctx.translate(-3,-22); ctx.rotate(ll);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-7,22); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.translate(3,-22); ctx.rotate(rl);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(7,22); ctx.stroke(); ctx.restore();

  ctx.strokeStyle = figureColors.body;
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(0,-44); ctx.stroke();

  ctx.strokeStyle = figureColors.limbs;
  ctx.save(); ctx.translate(-3,-40); ctx.rotate(la-0.28);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-16,14); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.translate(3,-40); ctx.rotate(ra+0.28);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(16,14); ctx.stroke(); ctx.restore();

  ctx.fillStyle = figureColors.head; ctx.strokeStyle='#1A1208'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.arc(0,-56,11,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1A1208';
  ctx.beginPath(); ctx.arc(-3.8,-57.5,1.6,0,Math.PI*2); ctx.arc(3.8,-57.5,1.6,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1A1208'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(0,-54.5,5.8,0.22,Math.PI-0.22); ctx.stroke();
  ctx.strokeStyle='#2A1206'; ctx.lineWidth=1.6;
  ctx.beginPath();
  ctx.moveTo(-5,-66); ctx.lineTo(-6,-71);
  ctx.moveTo(-1,-67); ctx.lineTo(-0.5,-72);
  ctx.moveTo(4,-66);  ctx.lineTo(5,-70);
  ctx.stroke();
  ctx.restore();
}

function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const cx = c.wx - cam.x;
    if (cx < -20 || cx > W + 20) continue;
    if (currentLevel === 3) {
      // Dark purple crystal (tall hexagon shard)
      ctx.fillStyle = '#4b0082';
      ctx.strokeStyle = '#1a0040';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx, c.y - 11); ctx.lineTo(cx + 6, c.y - 4);
      ctx.lineTo(cx + 7, c.y + 5); ctx.lineTo(cx, c.y + 11);
      ctx.lineTo(cx - 7, c.y + 5); ctx.lineTo(cx - 6, c.y - 4);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Shine
      ctx.fillStyle = 'rgba(200,150,255,0.35)';
      ctx.beginPath();
      ctx.moveTo(cx - 2, c.y - 10); ctx.lineTo(cx + 3, c.y - 3);
      ctx.lineTo(cx - 2, c.y - 3); ctx.closePath(); ctx.fill();
    } else if (currentLevel === 2) {
      // Blue gem (diamond shape)
      ctx.fillStyle = '#1e90ff';
      ctx.strokeStyle = '#004999';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx, c.y - 10); ctx.lineTo(cx + 8, c.y);
      ctx.lineTo(cx, c.y + 10); ctx.lineTo(cx - 8, c.y);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.moveTo(cx - 2, c.y - 9); ctx.lineTo(cx + 4, c.y - 2);
      ctx.lineTo(cx - 2, c.y - 2); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = '#FFD700';
      ctx.strokeStyle = '#B8860B';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, c.y, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#B8860B';
      ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('C', cx, c.y + 4);
    }
  }
}

function drawHUD() {
  const collected = coins.filter(c => c.collected).length;
  const total = coins.length;

  // Lives (hearts)
  ctx.font = '20px serif'; ctx.textAlign = 'left';
  for (let i = 0; i < 3; i++)
    ctx.fillText(i < lives ? '❤️' : '🖤', 12 + i * 26, 32);

  // Coin / gem counter
  if (currentLevel === 3) {
    ctx.fillStyle = '#4b0082'; ctx.strokeStyle = '#1a0040'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(18, 41); ctx.lineTo(24, 47); ctx.lineTo(25, 55); ctx.lineTo(18, 62);
    ctx.lineTo(11, 55); ctx.lineTo(10, 47);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (currentLevel === 2) {
    ctx.fillStyle = '#1e90ff'; ctx.strokeStyle = '#004999'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(18, 43); ctx.lineTo(27, 52); ctx.lineTo(18, 61); ctx.lineTo(9, 52);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else {
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#B8860B'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(18, 52, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#B8860B'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('C', 18, 56);
  }
  ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
  ctx.fillStyle = currentLevel === 3 ? '#ffffff' : currentLevel === 2 ? '#ffffff' : '#1A1208';
  ctx.font = 'bold 14px "Segoe Print",cursive'; ctx.textAlign = 'left';
  ctx.fillText(`${collected} / ${total}`, 32, 57);
  ctx.shadowBlur = 0;

  // Countdown timer — only appears in final 10 seconds, always red
  const remaining = Math.max(0, timerLimit - Math.floor(timerFrames / 60));
  if (remaining <= 10) {
    const mins = Math.floor(remaining / 60);
    const timeStr = `${mins}:${String(remaining % 60).padStart(2,'0')}`;
    ctx.fillStyle = '#DD2222';
    ctx.font = 'bold 16px "Segoe Print",cursive';
    ctx.textAlign = 'center';
    ctx.fillText(`⏱ ${timeStr}`, W/2, 20);
  }

  // Completion bar — top center
  const pct = Math.floor(collected / total * 100);
  const barW = 200, barH = 11, barX = W/2 - barW/2, barY = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.roundRect(barX - 1, barY - 1, barW + 2, barH + 2, 5); ctx.fill();
  ctx.fillStyle = currentLevel === 2 ? '#1e90ff' : '#FFD84D';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * (pct / 100), barH, 4); ctx.fill();
  ctx.strokeStyle = currentLevel === 2 ? '#004999' : '#b89000';
  ctx.lineWidth = 1; ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.stroke();
  ctx.shadowColor = '#000'; ctx.shadowBlur = 3;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px "Segoe Print",cursive'; ctx.textAlign = 'center';
  ctx.fillText(`${pct}%`, W/2, barY + barH + 13);
  ctx.shadowBlur = 0;

  // Score
  ctx.textAlign = 'right';
  ctx.fillText(`Score: ${score}`, W - 12, 20);
  if (streak >= 5) {
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`🔥 ${streak} streak!`, W - 12, 38);
  }

  // "Collect all coins!" warning
  if (needAllCoins > 0) {
    ctx.fillStyle = `rgba(220,60,60,${Math.min(1, needAllCoins/30)})`;
    ctx.font = 'bold 18px "Segoe Print",cursive'; ctx.textAlign = 'center';
    ctx.fillText('Collect all coins first!', W/2, 40);
  }
}

function drawNpc() {
  const nx = NPC_X - cam.x;
  const ny = NPC_Y + PH - 4; // feet (slightly above platform surface)

  // Draw "Press E" hint when nearby but not talking
  const nearNpc = Math.abs((player.x + PW/2) - NPC_X) < 80;
  if (nearNpc && !talkingToNpc) {
    ctx.fillStyle = '#1A1208'; ctx.font = '11px "Segoe Print",cursive'; ctx.textAlign = 'center';
    ctx.fillText('Press E to talk', nx, ny - PH - 18);
  }

  // Speech bubble
  if (talkingToNpc) {
    const line = DIALOGUE[dialogueIndex];
    const bw = 260, bh = 54, bx = nx - bw/2, by = ny - PH - bh - 28;
    ctx.fillStyle = '#fffde8'; ctx.strokeStyle = '#1A1208'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 8); ctx.fill(); ctx.stroke();
    // Tail
    ctx.beginPath(); ctx.moveTo(nx - 8, by + bh); ctx.lineTo(nx + 8, by + bh); ctx.lineTo(nx, by + bh + 12); ctx.closePath();
    ctx.fillStyle = '#fffde8'; ctx.fill(); ctx.strokeStyle = '#1A1208'; ctx.lineWidth = 2; ctx.stroke();
    // Text
    ctx.fillStyle = '#1A1208'; ctx.font = '11px "Segoe Print",cursive'; ctx.textAlign = 'center';
    // Word wrap
    const words = line.split(' '), maxW = bw - 20;
    let row = '', rows = [];
    for (const w of words) {
      const test = row ? row + ' ' + w : w;
      if (ctx.measureText(test).width > maxW) { rows.push(row); row = w; } else row = test;
    }
    rows.push(row);
    rows.forEach((r, i) => ctx.fillText(r, nx, by + 22 + i * 16));
    // Progress
    ctx.fillStyle = '#888'; ctx.font = '9px sans-serif';
    ctx.fillText(`${dialogueIndex + 1}/${DIALOGUE.length}  — E to continue`, nx, by + bh - 6);
  }

  // NPC stick figure (static, facing left toward player)
  ctx.save(); ctx.translate(nx, ny);
  ctx.strokeStyle = '#1A1208'; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 2.6;
  ctx.beginPath(); ctx.moveTo(-3,-22); ctx.lineTo(-7,0); ctx.stroke(); // left leg
  ctx.beginPath(); ctx.moveTo(3,-22);  ctx.lineTo(7,0);  ctx.stroke(); // right leg
  ctx.beginPath(); ctx.moveTo(0,-22);  ctx.lineTo(0,-44); ctx.stroke(); // body
  ctx.beginPath(); ctx.moveTo(-3,-40); ctx.lineTo(-16,-54); ctx.stroke(); // left arm raised (wave)
  ctx.beginPath(); ctx.moveTo(3,-40);  ctx.lineTo(16,-28); ctx.stroke(); // right arm down
  // Head
  ctx.fillStyle = '#c8f0c8'; ctx.strokeStyle = '#1A1208'; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.arc(0,-56,11,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Eyes
  ctx.fillStyle = '#1A1208';
  ctx.beginPath(); ctx.arc(-3.8,-57.5,1.6,0,Math.PI*2); ctx.arc(3.8,-57.5,1.6,0,Math.PI*2); ctx.fill();
  // Smile
  ctx.strokeStyle = '#1A1208'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(0,-54.5,5.8,0.22,Math.PI-0.22); ctx.stroke();
  ctx.restore();
}

function drawDust() {
  for (let i = dust.length - 1; i >= 0; i--) {
    const d = dust[i];
    d.x += d.vx; d.y += d.vy; d.vy += 0.08; d.life -= 0.045;
    if (d.life <= 0) { dust.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = d.life * 0.55;
    ctx.fillStyle = '#c8b89a';
    ctx.beginPath();
    ctx.ellipse(d.x - cam.x, d.y, d.r * d.life, d.r * 0.5 * d.life, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function getTimeRating(secs) {
  if (secs < 60)  return 10;
  if (secs < 90)  return 9;
  if (secs < 120) return 8;
  if (secs < 150) return 7;
  if (secs < 180) return 6;
  if (secs < 240) return 5;
  if (secs < 300) return 4;
  if (secs < 360) return 3;
  if (secs < 480) return 2;
  return 1;
}

function hit(mx, my, cx, cy, w, h) {
  return mx > cx-w/2 && mx < cx+w/2 && my > cy-h/2 && my < cy+h/2;
}
function menuBtn(label, cx, cy, w, h) {
  const hover = hit(mouseX, mouseY, cx, cy, w, h);
  ctx.fillStyle = hover ? '#ffe066' : '#FFD84D';
  ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h/2, w, h, 10); ctx.fill();
  ctx.fillStyle = '#1a1208'; ctx.font = 'bold 20px "Segoe Print",cursive';
  ctx.textAlign = 'center'; ctx.fillText(label, cx, cy+7);
}

function handleCustomizeClick(mx, my) {
  const rows = [{key:'head',y:155},{key:'body',y:255},{key:'limbs',y:355}];
  rows.forEach(({key,y}) => {
    PALETTES[key].forEach((col,i) => {
      if (Math.hypot(mx-(220+i*52), my-y) < 19) figureColors[key] = col;
    });
  });
  if (hit(mx, my, W/2, 458, 150, 44)) showCustomize = false;
}

  ctx.shadowBlur=0;
  ctx.fillStyle='#122012';
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,330);

  ctx.quadraticCurveTo(820,290,900,350); ctx.lineTo(900,H); ctx.closePath(); ctx.fill();

  const el = Date.now() - levelSelectStart;
  const visible = Math.min(STORY.length, Math.floor(el / 1800) + 1);
  ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
  for (let i = 0; i < visible; i++) {
    const isLast = i === STORY.length - 1;
    ctx.font = (isLast ? 'bold ' : '') + '18px "Segoe Print",cursive';
    ctx.fillStyle = isLast ? '#FFD84D' : (i === 4 ? '#aad4ff' : '#dde8ff');
    ctx.fillText(STORY[i], W/2, 90 + i * 50);
  }
  ctx.shadowBlur = 0;

  // Level 1 button after all lines + brief pause
  if (el > (STORY.length - 1) * 1800 + 800) {
    menuBtn('Level 1  ▶', W/2, 435, 170, 48);
  }
}

const menuStars = Array.from({length: 90}, (_, i) => ({
  x: (i * 157 + 23) % 900, y: (i * 97 + 11) % 300, r: i % 4 === 0 ? 1.4 : 0.65
}));

function drawMenuScreen() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#08082a'); sky.addColorStop(1, '#1a1a50');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = '#fff';
  for (const s of menuStars) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); }

  // Moon
  ctx.shadowColor = '#fffde8'; ctx.shadowBlur = 22;
  ctx.fillStyle = '#fffde8'; ctx.beginPath(); ctx.arc(730, 72, 28, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Back hills
  ctx.fillStyle = '#122012';
  ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(0, 330);
  ctx.quadraticCurveTo(180, 240, 360, 330); ctx.quadraticCurveTo(540, 410, 720, 340);
  ctx.quadraticCurveTo(820, 290, 900, 350); ctx.lineTo(900, H); ctx.closePath(); ctx.fill();

  // Front hills
  ctx.fillStyle = '#0c160c';
  ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(0, 390);
  ctx.quadraticCurveTo(120, 350, 250, 400); ctx.quadraticCurveTo(420, 450, 600, 390);
  ctx.quadraticCurveTo(750, 340, 900, 400); ctx.lineTo(900, H); ctx.closePath(); ctx.fill();

  // Trees
  ctx.fillStyle = '#081408';
  [[70,330],[130,315],[680,340],[760,325],[820,310]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-15,y+38); ctx.lineTo(x+15,y+38); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,y-16); ctx.lineTo(x-11,y+14); ctx.lineTo(x+11,y+14); ctx.closePath(); ctx.fill();
  });

  // Title
  ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#FFD84D'; ctx.font = 'bold 60px "Segoe Print",cursive';
  ctx.fillText('Stick & Run', W/2, 175);
  ctx.fillStyle = '#aac8ff'; ctx.font = '20px "Segoe Print",cursive';
  ctx.fillText('Made by Areg', W/2, 220);
  menuBtn('▶  Play', W/2, 308, 160, 46);
  menuBtn('🎨  Customize', W/2, 368, 220, 46);
  ctx.shadowBlur = 0;
}

function drawPauseMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#FFD84D'; ctx.font = 'bold 48px "Segoe Print",cursive';
  ctx.fillText('PAUSED', W/2, H/2 - 28);
  ctx.fillStyle = '#fff'; ctx.font = '22px "Segoe Print",cursive';
  ctx.fillText('P — Resume',    W/2, H/2 + 18);
  ctx.fillText('R — Restart',   W/2, H/2 + 50);
  ctx.fillText('M — Main Menu', W/2, H/2 + 82);
  ctx.shadowBlur = 0;
}

function drawInterlude() {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0004'); sky.addColorStop(1,'#2e000e');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(255,200,200,0.7)';
  for (const s of menuStars) { ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }
  ctx.shadowColor='#ff2200'; ctx.shadowBlur=24;
  ctx.fillStyle='#cc1a00'; ctx.beginPath(); ctx.arc(730,72,28,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#1a0508';
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,330);
  ctx.quadraticCurveTo(180,240,360,330); ctx.quadraticCurveTo(540,410,720,340);
  ctx.quadraticCurveTo(820,290,900,350); ctx.lineTo(900,H); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#110305';
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,390);
  ctx.quadraticCurveTo(120,350,250,400); ctx.quadraticCurveTo(420,450,600,390);
  ctx.quadraticCurveTo(750,340,900,400); ctx.lineTo(900,H); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#080102';
  [[70,330],[130,315],[680,340],[760,325],[820,310]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-15,y+38); ctx.lineTo(x+15,y+38); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,y-16); ctx.lineTo(x-11,y+14); ctx.lineTo(x+11,y+14); ctx.closePath(); ctx.fill();
  });
  const el = Date.now() - interludeStart;
  const visible = Math.min(INTERLUDE.length, Math.floor(el / 1800) + 1);
  ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 12;
  for (let i = 0; i < visible; i++) {
    const isLast = i === INTERLUDE.length - 1;
    ctx.font = (isLast ? 'bold ' : 'italic ') + '20px "Segoe Print",cursive';
    ctx.fillStyle = isLast ? '#FFD84D' : '#ffcccc';
    ctx.fillText(INTERLUDE[i], W/2, 170 + i * 80);
  }
  ctx.shadowBlur = 0;
  if (el > (INTERLUDE.length - 1) * 1800 + 800) {
    menuBtn('Continue  ▶', W/2, 430, 160, 48);
  }
}

function drawLevelComplete() {
  const sky = ctx.createLinearGradient(0,0,0,H);
  if (currentLevel === 2) {
    sky.addColorStop(0,'#020008'); sky.addColorStop(1,'#120020');
  } else {
    sky.addColorStop(0,'#08082a'); sky.addColorStop(1,'#1a1a50');
  }
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = currentLevel === 2 ? 'rgba(200,150,255,0.35)' : '#fff';
  for (const s of menuStars) { ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }
  if (currentLevel === 2) {
    ctx.shadowColor='#9b30ff'; ctx.shadowBlur=22;
    ctx.fillStyle='#3b006b'; ctx.beginPath(); ctx.arc(730,72,28,0,Math.PI*2); ctx.fill();
  } else {
    ctx.shadowColor='#fffde8'; ctx.shadowBlur=22;
    ctx.fillStyle='#fffde8'; ctx.beginPath(); ctx.arc(730,72,28,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.fillStyle = currentLevel === 2 ? '#0d0020' : '#122012';
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,330);
  ctx.quadraticCurveTo(180,240,360,330); ctx.quadraticCurveTo(540,410,720,340);
  ctx.quadraticCurveTo(820,290,900,350); ctx.lineTo(900,H); ctx.closePath(); ctx.fill();
  ctx.fillStyle = currentLevel === 2 ? '#070010' : '#0c160c';
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,390);
  ctx.quadraticCurveTo(120,350,250,400); ctx.quadraticCurveTo(420,450,600,390);
  ctx.quadraticCurveTo(750,340,900,400); ctx.lineTo(900,H); ctx.closePath(); ctx.fill();
  ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=14;
  ctx.fillStyle='#FFD84D'; ctx.font='bold 52px "Segoe Print",cursive';
  ctx.fillText(currentLevel === 2 ? 'Level 2 Complete!' : 'Level 1 Complete!', W/2, H/2 - 30);
  ctx.fillStyle='#dde8ff'; ctx.font='22px "Segoe Print",cursive';
  ctx.fillText(currentLevel === 2 ? 'Press K to continue to Level 3.' : 'Press K to continue to Level 2.', W/2, H/2 + 28);
  ctx.shadowBlur=0;
}

const ENDING_LINES = [
  "You made it.",
  "Just like I did.",
  "I was you once, Areg.",
  "I reached the trophy.",
  "And the moment I touched it...",
  "The world disappeared.",
  "So I rebuilt it.",
  "Harder. Darker. More impossible.",
  "Hoping you would fail.",
  "But here you are.",
  "Touch the trophy. And lose everything. Just like me.",
  "Or walk away. And finally end the cycle.",
];
const LINE_DURATION = 2600;
const LINE_FADE = 600;

function drawEnding() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  const now = Date.now();

  if (endingPhase === 'walkaway') {
    const t = Math.min(1, (now - endingFadeStart) / 1800);
    ctx.fillStyle = `rgba(0,0,0,${t})`; ctx.fillRect(0, 0, W, H);
    if (t >= 1) {
      ctx.textAlign = 'center'; ctx.font = 'italic 32px "Segoe Print",cursive';
      ctx.fillStyle = '#ccc'; ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
      ctx.fillText('Made by Areg.', W/2, H/2);
      ctx.shadowBlur = 0;
    }
    return;
  }

  const elapsed = now - endingStart;
  const lineIdx = Math.floor(elapsed / LINE_DURATION);

  if (lineIdx >= ENDING_LINES.length) {
    endingPhase = 'buttons';
  }

  if (endingPhase === 'lines') {
    const visibleUntil = Math.min(lineIdx, ENDING_LINES.length - 1);
    for (let i = 0; i <= visibleUntil; i++) {
      const lineStart = i * LINE_DURATION;
      const age = elapsed - lineStart;
      let alpha;
      if (i < visibleUntil) {
        // fade out older lines
        const fadeOutAge = elapsed - lineStart - LINE_DURATION + LINE_FADE;
        alpha = fadeOutAge > 0 ? Math.max(0, 1 - fadeOutAge / LINE_FADE) : 1;
      } else {
        alpha = Math.min(1, age / LINE_FADE);
      }
      if (alpha <= 0) continue;
      const isLast = i === ENDING_LINES.length - 1;
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.font = (isLast ? 'bold ' : 'italic ') + (isLast ? '20px' : '22px') + ' "Segoe Print",cursive';
      ctx.fillStyle = isLast ? '#e0aaff' : '#cccccc';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
      ctx.fillText(ENDING_LINES[i], W/2, H/2 - (visibleUntil - i) * 36 + (visibleUntil === ENDING_LINES.length - 1 ? -60 : 0));
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
    return;
  }

  // buttons phase
  ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
  for (let i = 0; i < ENDING_LINES.length; i++) {
    const isLast = i === ENDING_LINES.length - 1;
    ctx.font = (isLast ? 'bold 20px' : 'italic 22px') + ' "Segoe Print",cursive';
    ctx.fillStyle = isLast ? '#e0aaff' : 'rgba(180,180,180,0.35)';
    ctx.fillText(ENDING_LINES[i], W/2, H/2 - (ENDING_LINES.length - 1 - i) * 36 - 60);
  }
  ctx.shadowBlur = 0;
  menuBtn('Touch the trophy', W/2 - 140, 390, 200, 50);
  menuBtn('Walk away', W/2 + 140, 390, 180, 50);
}

function drawOverlay(title, sub) {
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=12;
  ctx.fillStyle='#FFD84D'; ctx.font='bold 52px "Segoe Print",cursive';
  ctx.fillText(title, W/2, H/2-16);
  ctx.fillStyle='#FFF'; ctx.font='21px "Segoe Print",cursive';
  ctx.fillText(sub, W/2, H/2+28);
  ctx.shadowBlur=0;
}

function loop() {
  ctx.clearRect(0,0,W,H);
  if (showEnding)      { drawEnding();           requestAnimationFrame(loop); return; }
  if (showCustomize)   { drawCustomizeScreen(); requestAnimationFrame(loop); return; }
  if (showInterlude)   { drawInterlude();       requestAnimationFrame(loop); return; }
  if (showLevelSelect) { drawLevelSelect();     requestAnimationFrame(loop); return; }
  if (showMenu)        { drawMenuScreen();      requestAnimationFrame(loop); return; }
  update();
  shake *= 0.75;
  const sx = shake > 0.3 ? (Math.random() - 0.5) * shake : 0;
  const sy = shake > 0.3 ? (Math.random() - 0.5) * shake : 0;
  ctx.save(); ctx.translate(sx, sy);
  drawBg();
  drawPlatforms();
  drawWindZones();
  drawCheckpoint();
  drawMovingPlats();
  drawSprings();
  drawSpikes();
  drawMarkers();
  drawCoins();
  drawBirds();
  if (currentLevel === 1) drawNpc();
  else if (currentLevel === 2) drawNpc2();
  drawDust();
  drawFigure();
  drawHUD();
  if (deathFlash > 0) { ctx.fillStyle=`rgba(220,60,60,${(deathFlash/24)*0.38})`; ctx.fillRect(0,0,W,H); }
  ctx.restore();
  if (paused)   drawPauseMenu();
  if (won)      drawLevelComplete();
  if (gameOver) drawOverlay(timerFrames >= timerLimit*60 ? 'Time\'s Up! ⏰' : 'Game Over 💀', `Score: ${score}  —  Press R to try again`);
  requestAnimationFrame(loop);
}
loop();
</script>
